name: Sync Icons

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Sync icons
        run: bash bin/sync.sh

      - name: Generate icons
        run: vendor/bin/blade-icons-generate

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status resources/svg --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'Update selfh.st icons'
          title: 'Update selfh.st icons'
          body: |
            This PR updates the selfh.st icons to the latest version from [selfhst/icons](https://github.com/selfhst/icons).
          branch: update-icons
          delete-branch: true
