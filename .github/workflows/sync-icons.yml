name: Sync Icons

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Sync icons
        run: bash bin/sync.sh

      - name: Generate icons
        run: vendor/bin/blade-icons-generate

      - name: Generate enums
        run: php bin/generate-enums.php

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status resources/svg src/Enums --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build changelog
        if: steps.changes.outputs.changed == 'true'
        id: changelog
        run: |
          ADDED=$(git status resources/svg --porcelain | grep '^?' | grep '\.svg$' | sed 's|^?? resources/svg/||' | sed 's/\.svg$//' | sort)
          REMOVED=$(git status resources/svg --porcelain | grep '^ D' | grep '\.svg$' | sed 's|^ D resources/svg/||' | sed 's/\.svg$//' | sort)
          MODIFIED=$(git status resources/svg --porcelain | grep '^ M' | grep '\.svg$' | sed 's|^ M resources/svg/||' | sed 's/\.svg$//' | sort)

          BODY=""

          if [ -n "$ADDED" ]; then
            COUNT=$(echo "$ADDED" | wc -l | tr -d ' ')
            BODY="${BODY}### Added (${COUNT})\n"
            while IFS= read -r icon; do
              BODY="${BODY}- \`${icon}\`\n"
            done <<< "$ADDED"
            BODY="${BODY}\n"
          fi

          if [ -n "$REMOVED" ]; then
            COUNT=$(echo "$REMOVED" | wc -l | tr -d ' ')
            BODY="${BODY}### Removed (${COUNT})\n"
            while IFS= read -r icon; do
              BODY="${BODY}- \`${icon}\`\n"
            done <<< "$REMOVED"
            BODY="${BODY}\n"
          fi

          if [ -n "$MODIFIED" ]; then
            COUNT=$(echo "$MODIFIED" | wc -l | tr -d ' ')
            BODY="${BODY}### Modified (${COUNT})\n"
            while IFS= read -r icon; do
              BODY="${BODY}- \`${icon}\`\n"
            done <<< "$MODIFIED"
            BODY="${BODY}\n"
          fi

          # Write to file to avoid escaping issues
          echo -e "$BODY" > /tmp/pr-changelog.md

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'Update selfh.st icons'
          title: 'Update selfh.st icons'
          body-path: /tmp/pr-changelog.md
          branch: update-icons
          delete-branch: true
          sign-commits: true
          labels: auto_update, github_actions

